services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: itemize_integration
      POSTGRES_USER: itemize_test
      POSTGRES_PASSWORD: itemize_test
    ports:
      - "${ITEMIZE_TEST_DB_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itemize_test -d itemize_integration"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
